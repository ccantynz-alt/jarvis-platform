<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!--
  JARVIS Command Deck app-icon source. Render with the screenshot service at
  a square window matching ?s= (e.g. ?s=512 + window 512x512):
    POST :9201/screenshot/capture {"url":"http://127.0.0.1:9210/deck-icon.html?s=512",
                                   "options":{"width":512,"height":512,"waitMs":800}}
  The mark mirrors the live Deck orb: concentric cyan rings, tick ring,
  glowing core, on #04060c. Pure SVG — no fonts, no network.
-->
<style>
  html,body{margin:0;padding:0;background:#04060c;overflow:hidden}
  svg{display:block}
</style>
</head>
<body>
<script>
const s = parseInt(new URLSearchParams(location.search).get('s') || '512', 10);
document.body.innerHTML = `
<svg width="${s}" height="${s}" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#007a9e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#eaffff"/>
      <stop offset="55%" stop-color="#9feaff"/>
      <stop offset="100%" stop-color="#00c8e6"/>
    </radialGradient>
    <filter id="blurSoft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="512" height="512" fill="#04060c"/>
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>

  <!-- outer tick ring (60 ticks, every 5th long — same as the deck orb) -->
  <g stroke="#00e5ff" stroke-opacity="0.35" stroke-width="3">
    ${Array.from({length: 60}, (_, i) => {
      const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
      const r1 = 216, r2 = i % 5 === 0 ? 236 : 226;
      const x1 = 256 + Math.cos(a) * r1, y1 = 256 + Math.sin(a) * r1;
      const x2 = 256 + Math.cos(a) * r2, y2 = 256 + Math.sin(a) * r2;
      return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
    }).join('')}
  </g>

  <!-- rotating-arc rings (frozen at a dynamic-looking phase) -->
  <g fill="none" stroke-linecap="round">
    <circle cx="256" cy="256" r="196" stroke="#00e5ff" stroke-opacity="0.9" stroke-width="7"
            stroke-dasharray="480 800" transform="rotate(-35 256 256)"/>
    <circle cx="256" cy="256" r="196" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="3"/>
    <circle cx="256" cy="256" r="164" stroke="#00e5ff" stroke-opacity="0.55" stroke-width="4"
            stroke-dasharray="300 740" transform="rotate(120 256 256)"/>
    <circle cx="256" cy="256" r="140" stroke="#7df4ff" stroke-opacity="0.35" stroke-width="3"
            stroke-dasharray="180 700" transform="rotate(240 256 256)"/>
  </g>

  <!-- waveform ring hint -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#00e5ff" stroke-opacity="0.8" stroke-width="4"/>

  <!-- core -->
  <circle cx="256" cy="256" r="86" fill="#00e5ff" fill-opacity="0.35" filter="url(#blurSoft)"/>
  <circle cx="256" cy="256" r="62" fill="url(#core)"/>
</svg>`;
</script>
</body>
</html>
