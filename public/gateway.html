<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JARVIS</title>
<style>
  :root {
    --bg: #06090f; --panel: #0b1220; --panel2: #101a2e; --line: #1b2a45;
    --text: #d7e2f4; --dim: #6b7f9e; --accent: #37b7ff; --accent2: #7ef0c0;
    --warn: #ffcc66; --alert: #ff6b7a; --user: #16283f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.45 -apple-system, "SF Pro Text", Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column; overflow: hidden;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
  }
  .logo { font-weight: 800; letter-spacing: .18em; font-size: 15px; color: var(--accent); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--alert); transition: background .3s; }
  .dot.on { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  header .spacer { flex: 1; }
  .hbtn {
    position: relative; border: 1px solid var(--line); background: var(--panel2); color: var(--text);
    border-radius: 10px; padding: 7px 12px; font-size: 14px; cursor: pointer;
  }
  .hbtn.active { border-color: var(--accent); color: var(--accent); }
  #inboxBadge {
    position: absolute; top: -6px; right: -6px; min-width: 18px; height: 18px; border-radius: 9px;
    background: var(--alert); color: #fff; font-size: 11px; font-weight: 700;
    display: none; align-items: center; justify-content: center; padding: 0 5px;
  }
  #transcript { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 86%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--user); border: 1px solid #23405f; }
  .msg.jarvis { align-self: flex-start; background: var(--panel2); border: 1px solid var(--line); }
  .msg.jarvis.interim { opacity: .8; }
  .msg .meta { font-size: 11px; color: var(--dim); margin-top: 6px; }
  .msg.notify { align-self: stretch; max-width: none; background: #101d16; border: 1px solid #1e4635; }
  .msg.notify.warn { background: #201a0e; border-color: #4d3d1a; }
  .msg.notify.alert { background: #241014; border-color: #5c2430; }
  footer { border-top: 1px solid var(--line); background: var(--panel); padding: 10px 12px 14px; }
  .inputrow { display: flex; gap: 10px; align-items: center; }
  #textIn {
    flex: 1; background: var(--panel2); border: 1px solid var(--line); border-radius: 12px;
    color: var(--text); padding: 12px 14px; font-size: 16px; outline: none;
  }
  #textIn:focus { border-color: var(--accent); }
  #micBtn {
    width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--accent);
    background: radial-gradient(circle at 35% 30%, #123, #0a1524); color: var(--accent);
    font-size: 26px; cursor: pointer; flex: none; transition: all .15s;
  }
  #micBtn.listening {
    background: radial-gradient(circle at 35% 30%, #ff5f6d33, #2a0f16);
    border-color: var(--alert); color: var(--alert); animation: pulse 1.2s infinite;
  }
  #micBtn:disabled { opacity: .35; border-color: var(--dim); color: var(--dim); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 #ff6b7a44; } 50% { box-shadow: 0 0 0 14px #ff6b7a00; } }
  #hint { text-align: center; color: var(--dim); font-size: 12px; margin-top: 8px; min-height: 15px; }
  #sendBtn { border: 1px solid var(--line); background: var(--panel2); color: var(--accent);
    border-radius: 12px; padding: 12px 16px; font-size: 15px; cursor: pointer; }
  /* Inbox drawer */
  #inbox {
    position: fixed; inset: 0; background: #04070ccc; display: none; z-index: 40;
  }
  #inbox.open { display: block; }
  #inboxPanel {
    position: absolute; right: 0; top: 0; bottom: 0; width: min(420px, 92vw);
    background: var(--panel); border-left: 1px solid var(--line); display: flex; flex-direction: column;
  }
  #inboxPanel h2 { font-size: 14px; letter-spacing: .12em; color: var(--accent);
    padding: 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; }
  #inboxPanel h2 .spacer { flex: 1; }
  #inboxList { flex: 1; overflow-y: auto; }
  .nitem { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .nitem.unread { background: #0e1930; border-left: 3px solid var(--accent); }
  .nitem .t { font-weight: 600; font-size: 14px; }
  .nitem .b { color: var(--dim); font-size: 13px; margin-top: 3px; white-space: pre-wrap; }
  .nitem .ts { color: var(--dim); font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>
<header>
  <span class="dot" id="connDot"></span>
  <span class="logo">JARVIS</span>
  <span class="spacer"></span>
  <button class="hbtn" id="muteBtn" title="Toggle speech">🔊</button>
  <button class="hbtn" id="inboxBtn">Inbox<span id="inboxBadge"></span></button>
</header>

<div id="transcript"></div>

<footer>
  <div class="inputrow">
    <button id="micBtn" title="Push to talk">🎙</button>
    <input id="textIn" type="text" placeholder="Talk or type to Jarvis…" autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
  <div id="hint"></div>
</footer>

<div id="inbox">
  <div id="inboxPanel">
    <h2>NOTIFICATIONS <span class="spacer"></span>
      <button class="hbtn" id="readAllBtn">Mark all read</button>
      <button class="hbtn" id="closeInbox" style="margin-left:8px">✕</button>
    </h2>
    <div id="inboxList"></div>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const transcript = $('transcript'), hint = $('hint');

  // ── Mute / TTS ─────────────────────────────────────────────────────────────
  let muted = localStorage.getItem('jarvis_muted') === '1';
  let ttsPrimed = false;
  const muteBtn = $('muteBtn');
  const renderMute = () => { muteBtn.textContent = muted ? '🔇' : '🔊'; muteBtn.classList.toggle('active', !muted); };
  renderMute();
  muteBtn.onclick = () => { muted = !muted; localStorage.setItem('jarvis_muted', muted ? '1' : '0'); renderMute(); if (muted) speechSynthesis.cancel(); };

  function primeTTS() { // iOS: speech must be unlocked by a user gesture
    if (ttsPrimed || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(''); u.volume = 0; speechSynthesis.speak(u); ttsPrimed = true;
  }
  function speak(text) {
    if (muted || !text || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.04; u.pitch = 0.95;
    const voices = speechSynthesis.getVoices();
    u.voice = voices.find(v => /en[-_](GB|AU|NZ)/i.test(v.lang) && /male|daniel|arthur/i.test(v.name))
      || voices.find(v => /^en/i.test(v.lang)) || null;
    speechSynthesis.speak(u);
  }

  // ── Transcript rendering ───────────────────────────────────────────────────
  function bubble(cls, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
    return div;
  }
  function meta(div, s) {
    const m = document.createElement('div'); m.className = 'meta'; m.textContent = s; div.appendChild(m);
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  let ws, streamDiv = null, reconnectDelay = 1000;
  function connect() {
    ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
    ws.onopen = () => { $('connDot').classList.add('on'); hint.textContent = ''; reconnectDelay = 1000; };
    ws.onclose = () => {
      $('connDot').classList.remove('on');
      hint.textContent = 'reconnecting…';
      setTimeout(connect, reconnectDelay = Math.min(reconnectDelay * 2, 15000));
    };
    ws.onmessage = (ev) => {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.type === 'reply') {
        const div = bubble('jarvis' + (m.interim ? ' interim' : ''), m.text || '');
        if (!m.interim && m.intent) meta(div, `${m.intent} · ${m.via} · ${m.ms}ms`);
        speak(m.speech);
      } else if (m.type === 'reply_chunk') {
        if (!streamDiv) streamDiv = bubble('jarvis', '');
        streamDiv.textContent += m.text;
        transcript.scrollTop = transcript.scrollHeight;
      } else if (m.type === 'reply_done') {
        if (streamDiv) { meta(streamDiv, `converse · ${m.ms}ms`); }
        speak(m.speech); streamDiv = null;
      } else if (m.type === 'notify') {
        const n = m.notification;
        bubble('notify ' + (n.level || 'info'), `${n.title}${n.body && n.body !== n.title ? '\n' + n.body : ''}`);
        speak(n.speech);
        refreshInbox();
      } else if (m.type === 'job_update') {
        const j = m.payload;
        bubble('notify ' + (j.status === 'completed' ? 'info' : 'warn'), `Job ${String(j.id).slice(0,8)} on ${j.platform}: ${j.status}`);
      }
    };
  }
  connect();

  // ── Sending ────────────────────────────────────────────────────────────────
  function send(text) {
    text = (text || '').trim();
    if (!text || !ws || ws.readyState !== 1) return;
    bubble('user', text);
    ws.send(JSON.stringify({ type: 'utterance', text, mode: 'auto' }));
  }
  $('sendBtn').onclick = () => { primeTTS(); send($('textIn').value); $('textIn').value = ''; };
  $('textIn').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { primeTTS(); send($('textIn').value); $('textIn').value = ''; }
  });

  // ── Voice (push-to-talk) ───────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = $('micBtn');
  if (!SR) {
    micBtn.disabled = true;
    hint.textContent = location.protocol === 'https:'
      ? 'Voice not supported in this browser — use the text box'
      : '⚠ Voice needs the https ts.net address, not http';
  } else {
    let rec = null, listening = false;
    micBtn.onclick = () => {
      primeTTS();
      if (listening) { rec?.stop(); return; }
      speechSynthesis.cancel();
      rec = new SR();
      rec.lang = 'en-NZ'; rec.interimResults = true; rec.continuous = false;
      let finalText = '';
      rec.onstart = () => { listening = true; micBtn.classList.add('listening'); hint.textContent = 'listening…'; };
      rec.onresult = (e) => {
        let interim = '';
        for (const r of e.results) (r.isFinal ? (finalText += r[0].transcript) : (interim += r[0].transcript));
        hint.textContent = interim || finalText || 'listening…';
      };
      rec.onerror = (e) => { hint.textContent = e.error === 'not-allowed' ? '⚠ Mic permission denied — check Safari settings' : `voice error: ${e.error}`; };
      rec.onend = () => {
        listening = false; micBtn.classList.remove('listening');
        if (finalText.trim()) { hint.textContent = ''; send(finalText); } else if (!hint.textContent.startsWith('⚠')) hint.textContent = '';
      };
      rec.start();
    };
  }

  // ── Inbox ──────────────────────────────────────────────────────────────────
  const badge = $('inboxBadge');
  async function refreshInbox(render = false) {
    try {
      const d = await fetch('/api/inbox').then(r => r.json());
      badge.style.display = d.unread ? 'flex' : 'none';
      badge.textContent = d.unread;
      if (render) {
        const list = $('inboxList'); list.innerHTML = '';
        for (const n of d.notifications || []) {
          const div = document.createElement('div');
          div.className = 'nitem' + (n.read_at ? '' : ' unread');
          div.innerHTML = `<div class="t"></div><div class="b"></div><div class="ts"></div>`;
          div.querySelector('.t').textContent = n.title;
          div.querySelector('.b').textContent = n.body && n.body !== n.title ? n.body : '';
          div.querySelector('.ts').textContent = `${n.source} · ${new Date(n.ts).toLocaleString()}`;
          div.onclick = async () => {
            if (!n.read_at) { await fetch(`/api/inbox/${n.id}/read`, { method: 'POST' }); refreshInbox(true); }
          };
          list.appendChild(div);
        }
      }
    } catch { /* offline */ }
  }
  $('inboxBtn').onclick = () => { $('inbox').classList.add('open'); refreshInbox(true); };
  $('closeInbox').onclick = () => $('inbox').classList.remove('open');
  $('inbox').onclick = (e) => { if (e.target.id === 'inbox') $('inbox').classList.remove('open'); };
  $('readAllBtn').onclick = async () => { await fetch('/api/inbox/all/read', { method: 'POST' }); refreshInbox(true); };
  refreshInbox();
  setInterval(() => refreshInbox(false), 60000);

  bubble('jarvis', 'Jarvis online. Tap the mic and talk to me — try "status", "briefing", or "how is gatetest".');
})();
</script>
</body>
</html>
